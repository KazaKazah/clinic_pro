<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Система клиники{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8f9fa;
        }

        .sidebar {
            min-height: 100vh;
            background-color: #ffffff;
            border-right: 1px solid #dee2e6;
        }

        .sidebar .nav-link {
            color: #333;
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .sidebar .nav-link:hover {
            background-color: #f1f3f5;
        }

        .sidebar .nav-link.active {
            background-color: #0d6efd;
            color: white;
        }

        .content-wrapper {
            padding: 24px;
        }

        .topbar {
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
            padding: 12px 20px;
        }

        .page-card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #dee2e6;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="topbar d-flex justify-content-between align-items-center">
        <div>
            <strong>Частная клиника</strong>
        </div>
        <div>
            <span class="text-muted">Рабочая панель</span>
        </div>
    </div>

    <div class="container-fluid">
        <div class="row">
            <aside class="col-md-3 col-lg-2 sidebar p-3">
                <h5 class="mb-4">Меню</h5>

                <nav class="nav flex-column">
                    <a class="nav-link active" href="#">Лист медсестры</a>
                    <a class="nav-link" href="#">Пациенты</a>
                    <a class="nav-link" href="#">Поликлиника</a>
                    <a class="nav-link" href="#">Стационар</a>
                    <a class="nav-link" href="#">Анализы</a>
                    <a class="nav-link" href="#">Склад</a>
                </nav>
            </aside>

            <main class="col-md-9 col-lg-10 content-wrapper">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
