{% extends "base.html" %}

{% block title %}Склад{% endblock %}

{% block content %}
<div class="page-card p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1">Склад</h2>
            <p class="text-muted mb-0">Остатки, низкие остатки и движения</p>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <label class="form-label">Поиск</label>
            <input type="text" id="stockSearch" class="form-control" placeholder="Название..."
                oninput="rerenderStockTables()">
        </div>

        <div class="col-md-3 d-flex align-items-end">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="onlyLowStock" onchange="rerenderStockTables()">
                <label class="form-check-label" for="onlyLowStock">
                    Только низкие остатки
                </label>
            </div>
        </div>
    </div>


    <div id="alertBox"></div>

    <div id="summaryBlock" class="mb-4"></div>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-light">
                    <h5 class="mb-0">Лекарства</h5>
                </div>
                <div class="card-body">
                    <div id="medicationsTable"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-light">
                    <h5 class="mb-0">Материалы</h5>
                </div>
                <div class="card-body">
                    <div id="materialsTable"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-light">
                    <h5 class="mb-0">Низкие остатки</h5>
                </div>
                <div class="card-body">
                    <div id="lowStockBlock"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-light">
                    <h5 class="mb-0">Последние движения</h5>
                </div>
                <div class="card-body">
                    <div id="movementsTable"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let materialsCache = [];
    let medicationsCache = [];
    let movementsCache = [];

    function getCookie(name) {
        let cookieValue = null;

        if (document.cookie && document.cookie !== "") {
            const cookies = document.cookie.split(";");

            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();

                if (cookie.substring(0, name.length + 1) === (name + "=")) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }

        return cookieValue;
    }

    const csrftoken = getCookie("csrftoken");
    axios.defaults.headers.common["X-CSRFToken"] = csrftoken;
    axios.defaults.headers.common["X-Requested-With"] = "XMLHttpRequest";

    document.addEventListener("DOMContentLoaded", function () {
        loadStockDashboard();
    });

    function showAlert(message, type = "danger") {
        document.getElementById("alertBox").innerHTML = `
            <div class="alert alert-${type}" role="alert">
                ${message}
            </div>
        `;
    }

    function clearAlert() {
        document.getElementById("alertBox").innerHTML = "";
    }

    function loadStockDashboard() {
        clearAlert();

        Promise.all([
            axios.get("/api/materials/"),
            axios.get("/api/medications/"),
            axios.get("/api/stock-movements/")
        ])
        .then(function(responses) {
            materialsCache = responses[0].data || [];
            medicationsCache = responses[1].data || [];
            movementsCache = responses[2].data || [];

            renderSummary();
            renderMaterials();
            renderMedications();
            renderLowStock();
            renderMovements();
        })
        .catch(function(error) {
            console.error(error);
            showAlert("Не удалось загрузить данные склада");
        });
    }

    function renderSummary() {
        const materialCount = materialsCache.length;
        const medicationCount = medicationsCache.length;

        const lowMaterials = materialsCache.filter(x => x.is_low_stock).length;
        const lowMedications = medicationsCache.filter(x => x.is_low_stock).length;

        const totalLow = lowMaterials + lowMedications;

        document.getElementById("summaryBlock").innerHTML = `
            <div class="row g-3">
                <div class="col-md-3">
                    <div class="card p-3 text-center bg-light border-0 shadow-sm">
                        <h5 class="mb-1">${materialCount}</h5>
                        <small class="text-muted">Материалов</small>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-3 text-center bg-light border-0 shadow-sm">
                        <h5 class="mb-1">${medicationCount}</h5>
                        <small class="text-muted">Лекарств</small>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-3 text-center bg-danger-subtle border-0 shadow-sm">
                        <h5 class="mb-1">${totalLow}</h5>
                        <small class="text-muted">Низкие остатки</small>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card p-3 text-center bg-light border-0 shadow-sm">
                        <h5 class="mb-1">${movementsCache.length}</h5>
                        <small class="text-muted">Движений</small>
                    </div>
                </div>
            </div>
        `;
    }

    function renderMaterials() {
    const items = filterStockItems(materialsCache);

    let html = `
        <div class="table-responsive">
            <table class="table table-bordered align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Название</th>
                        <th>Ед.</th>
                        <th>Остаток</th>
                        <th>Мин.</th>
                        <th>Приход</th>
                        <th>Корректировка</th>
                    </tr>
                </thead>
                <tbody>
    `;

    if (!items.length) {
        html += `
            <tr>
                <td colspan="6" class="text-center text-muted">Нет материалов</td>
            </tr>
        `;
    } else {
        items.forEach(function(item) {
            html += `
                <tr class="${item.is_low_stock ? "table-danger" : ""}">
                    <td>${escapeHtml(item.name)}</td>
                    <td>${escapeHtml(item.unit || "-")}</td>
                    <td>${escapeHtml(String(item.stock_qty ?? 0))}</td>
                    <td>${escapeHtml(String(item.min_stock ?? 0))}</td>
                    <td>
                        <div class="d-flex gap-2">
                            <input type="number"
                                   min="1"
                                   class="form-control form-control-sm"
                                   style="max-width: 90px"
                                   id="material_qty_${item.id}"
                                   value="1">
                            <button class="btn btn-sm btn-primary"
                                    onclick="addMaterialStock(${item.id})">
                                Приход
                            </button>
                        </div>
                    </td>
                    <td>
                        <div class="d-flex gap-2">
                            <input type="number"
                                   min="0"
                                   class="form-control form-control-sm"
                                   style="max-width: 90px"
                                   id="material_new_qty_${item.id}"
                                   value="${item.stock_qty}">
                            <button class="btn btn-sm btn-outline-secondary"
                                    onclick="adjustMaterialStock(${item.id})">
                                Исправить
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        });
    }

    html += `</tbody></table></div>`;
    document.getElementById("materialsTable").innerHTML = html;
}

    function renderMedications() {
    const items = filterStockItems(medicationsCache);

    let html = `
        <div class="table-responsive">
            <table class="table table-bordered align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Название</th>
                        <th>Форма</th>
                        <th>Остаток</th>
                        <th>Мин.</th>
                        <th>Приход</th>
                        <th>Корректировка</th>
                    </tr>
                </thead>
                <tbody>
    `;

    if (!items.length) {
        html += `
            <tr>
                <td colspan="6" class="text-center text-muted">Нет лекарств</td>
            </tr>
        `;
    } else {
        items.forEach(function(item) {
            html += `
                <tr class="${item.is_low_stock ? "table-danger" : ""}">
                    <td>${escapeHtml(item.name)}</td>
                    <td>${escapeHtml(item.form || "-")}</td>
                    <td>${escapeHtml(String(item.stock_qty ?? 0))}</td>
                    <td>${escapeHtml(String(item.min_stock ?? 0))}</td>
                    <td>
                        <div class="d-flex gap-2">
                            <input type="number"
                                   min="1"
                                   class="form-control form-control-sm"
                                   style="max-width: 90px"
                                   id="medication_qty_${item.id}"
                                   value="1">
                            <button class="btn btn-sm btn-primary"
                                    onclick="addMedicationStock(${item.id})">
                                Приход
                            </button>
                        </div>
                    </td>
                    <td>
                        <div class="d-flex gap-2">
                            <input type="number"
                                   min="0"
                                   class="form-control form-control-sm"
                                   style="max-width: 90px"
                                   id="medication_new_qty_${item.id}"
                                   value="${item.stock_qty}">
                            <button class="btn btn-sm btn-outline-secondary"
                                    onclick="adjustMedicationStock(${item.id})">
                                Исправить
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        });
    }

    html += `</tbody></table></div>`;
    document.getElementById("medicationsTable").innerHTML = html;
}

    function renderLowStock() {
        const lowMaterials = materialsCache
            .filter(x => x.is_low_stock)
            .map(x => ({
                type: "Материал",
                name: x.name,
                qty: x.stock_qty,
                min: x.min_stock
            }));

        const lowMedications = medicationsCache
            .filter(x => x.is_low_stock)
            .map(x => ({
                type: "Лекарство",
                name: x.name,
                qty: x.stock_qty,
                min: x.min_stock
            }));

        const items = [...lowMaterials, ...lowMedications];

        let html = `
            <div class="table-responsive">
                <table class="table table-bordered align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Тип</th>
                            <th>Название</th>
                            <th>Остаток</th>
                            <th>Минимум</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        if (!items.length) {
            html += `
                <tr>
                    <td colspan="4" class="text-center text-muted">Низких остатков нет</td>
                </tr>
            `;
        } else {
            items.forEach(function(item) {
                html += `
                    <tr class="table-danger">
                        <td>${escapeHtml(item.type)}</td>
                        <td>${escapeHtml(item.name)}</td>
                        <td>${escapeHtml(String(item.qty))}</td>
                        <td>${escapeHtml(String(item.min))}</td>
                    </tr>
                `;
            });
        }

        html += `
                    </tbody>
                </table>
            </div>
        `;

        document.getElementById("lowStockBlock").innerHTML = html;
    }

    function renderMovements() {
        const items = movementsCache.slice(0, 20);

        let html = `
            <div class="table-responsive">
                <table class="table table-bordered align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Дата</th>
                            <th>Тип</th>
                            <th>Номенклатура</th>
                            <th>Операция</th>
                            <th>Кол-во</th>
                            <th>Источник</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        if (!items.length) {
            html += `
                <tr>
                    <td colspan="6" class="text-center text-muted">Движений пока нет</td>
                </tr>
            `;
        } else {
            items.forEach(function(item) {
                html += `
                    <tr>
                        <td>${escapeHtml(formatDateTime(item.created_at))}</td>
                        <td>${escapeHtml(item.item_type_display || item.item_type || "-")}</td>
                        <td>${escapeHtml(item.item_name || "-")}</td>
                        <td>${escapeHtml(item.movement_type_display || item.movement_type || "-")}</td>
                        <td>${escapeHtml(String(item.qty ?? 0))}</td>
                        <td>${escapeHtml(item.source || "-")}</td>
                    </tr>
                `;
            });
        }

        html += `
                    </tbody>
                </table>
            </div>
        `;

        document.getElementById("movementsTable").innerHTML = html;
    }

    function addMaterialStock(id) {
        clearAlert();

        const qty = document.getElementById(`material_qty_${id}`).value;

        if (!qty || Number(qty) < 1) {
            showAlert("Количество прихода должно быть не меньше 1", "warning");
            return;
        }

        axios.post(`/api/materials/${id}/add_stock/`, {
            qty: Number(qty),
            comment: "Приход со страницы склада"
        })
        .then(function() {
            showAlert("Приход материала выполнен", "success");
            loadStockDashboard();
        })
        .catch(function(error) {
            console.error(error);
            showAlert(getErrorMessage(error, "Не удалось выполнить приход материала"));
        });
    }

    function addMedicationStock(id) {
        clearAlert();

        const qty = document.getElementById(`medication_qty_${id}`).value;

        if (!qty || Number(qty) < 1) {
            showAlert("Количество прихода должно быть не меньше 1", "warning");
            return;
        }

        axios.post(`/api/medications/${id}/add_stock/`, {
            qty: Number(qty),
            comment: "Приход со страницы склада"
        })
        .then(function() {
            showAlert("Приход лекарства выполнен", "success");
            loadStockDashboard();
        })
        .catch(function(error) {
            console.error(error);
            showAlert(getErrorMessage(error, "Не удалось выполнить приход лекарства"));
        });
    }

    function getErrorMessage(error, fallbackText) {
        if (error.response && error.response.data) {
            if (typeof error.response.data.detail === "string") {
                return error.response.data.detail;
            }

            if (typeof error.response.data === "string") {
                return error.response.data;
            }

            try {
                return JSON.stringify(error.response.data);
            } catch (e) {}
        }

        return fallbackText;
    }

    function formatDateTime(value) {
        if (!value) return "-";

        try {
            const date = new Date(value);
            if (isNaN(date.getTime())) return value;
            return date.toLocaleString("ru-RU");
        } catch (e) {
            return value;
        }
    }

    function escapeHtml(value) {
        if (value === null || value === undefined) return "";
        return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }


    function getStockFilters() {
    return {
        search: (document.getElementById("stockSearch")?.value || "").toLowerCase().trim(),
        onlyLow: document.getElementById("onlyLowStock")?.checked || false
    };
}

    function filterStockItems(items) {
        const filters = getStockFilters();

        return items.filter(function(item) {
            const matchesSearch = !filters.search ||
                (item.name || "").toLowerCase().includes(filters.search);

            const matchesLow = !filters.onlyLow || item.is_low_stock;

            return matchesSearch && matchesLow;
        });
    }

    function rerenderStockTables() {
        renderSummary();
        renderMaterials();
        renderMedications();
        renderLowStock();
        renderMovements();
    }


    function adjustMaterialStock(id) {
    clearAlert();

    const newQty = document.getElementById(`material_new_qty_${id}`).value;

    if (newQty === "" || Number(newQty) < 0) {
        showAlert("Новый остаток не может быть отрицательным", "warning");
        return;
    }

    axios.post(`/api/materials/${id}/adjust_stock/`, {
        new_qty: Number(newQty),
        comment: "Корректировка со страницы склада"
    })
    .then(function() {
        showAlert("Остаток материала скорректирован", "success");
        loadStockDashboard();
    })
    .catch(function(error) {
        console.error(error);
        showAlert(getErrorMessage(error, "Не удалось скорректировать материал"));
    });
}

function adjustMedicationStock(id) {
    clearAlert();

    const newQty = document.getElementById(`medication_new_qty_${id}`).value;

    if (newQty === "" || Number(newQty) < 0) {
        showAlert("Новый остаток не может быть отрицательным", "warning");
        return;
    }

    axios.post(`/api/medications/${id}/adjust_stock/`, {
        new_qty: Number(newQty),
        comment: "Корректировка со страницы склада"
    })
    .then(function() {
        showAlert("Остаток лекарства скорректирован", "success");
        loadStockDashboard();
    })
    .catch(function(error) {
        console.error(error);
        showAlert(getErrorMessage(error, "Не удалось скорректировать лекарство"));
    });
}
</script>
{% endblock %}
