{% extends "base/base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h4 mb-3">Вход в систему</h1>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="{{ form.username.id_for_label }}">Логин</label>
                        <input class="form-control" type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="{{ form.password.id_for_label }}">Пароль</label>
                        <input class="form-control" type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}" required>
                    </div>
                    {% if form.errors %}
                        <div class="alert alert-danger">Проверьте логин и пароль.</div>
                    {% endif %}
                    <button class="btn btn-primary w-100" type="submit">Войти</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
